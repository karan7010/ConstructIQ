name: construction_app
description: AI-Assisted Construction Planning and Resource Intelligence System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  dio: ^5.4.1
  fl_chart: ^0.66.0
  pdf: ^3.10.8
  printing: ^5.11.1
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.0.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  uuid: ^4.2.1
  file_picker: ^8.0.0
  flutter_local_notifications: ^17.1.2
  google_sign_in: ^6.2.1
  geolocator: ^14.0.2
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  onnxruntime: ^1.4.0
  share_plus: ^10.1.0
  dotted_border: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/cost_overrun_model.onnx
